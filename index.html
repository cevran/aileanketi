let current='';
function loadSurvey(k){current=k; let h=''; surveys[k].forEach((q,i)=>{h+=`<div class=q><b>${i+1}. ${q.text}</b><div>${[1,2,3,4,5].map(v=>`<label><input type=radio name=q${i} value=${v}>${v}</label>`).join(' ')}</div></div>`}); h+=`<button onclick='calc()'>Rapor Oluştur</button>`; survey.innerHTML=h; }
function calc(){let t=0,max=surveys[current].length*5,cats={}; for(let i=0;i<surveys[current].length;i++){let c=document.querySelector('input[name=q'+i+']:checked'); if(!c){alert((i+1)+'. soru');return;} let v=+c.value;t+=v; let cat=surveys[current][i].cat;(cats[cat]=cats[cat]||[]).push(v);} let labels=[],vals=[],strength=[],improve=[]; for(let k in cats){let s=Math.round(cats[k].reduce((a,b)=>a+b)/cats[k].length*20); labels.push(k); vals.push(s); if(s>=80) strength.push(k); if(s<65) improve.push(k);} let p=Math.round(t/max*100); result.classList.remove('hidden'); result.innerHTML=`<div class=panel><h2>Sonuç %${p}</h2><canvas id=radar></canvas><div class=scores>${labels.map((l,i)=>`<div class='score' style='background:hsl(${i*50},70%,45%)'>${l}<br><b>%${vals[i]}</b></div>`).join('')}</div><h3>AI Analizi</h3><p>${p>80?'İlişki genel olarak güçlü görünüyor.':'Geliştirilmesi gereken alanlar bulunuyor.'} Güçlü yönler: ${strength.join(', ')||'Yok'}. Gelişim alanları: ${improve.join(', ')||'Yok'}.</p><textarea style='width:100%;height:120px' placeholder='Ek notlar'></textarea></div>`; new Chart(document.getElementById('radar'),{type:'radar',data:{labels:labels,datasets:[{data:vals}]}}); window.scrollTo(0,document.body.scrollHeight); localStorage.setItem('lastScore',p);}
