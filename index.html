<!DOCTYPE html><html lang='tr'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Ailemizi Daha İyi Anlıyoruz</title><script src='https://cdn.jsdelivr.net/npm/chart.js'></script><style>body{font-family:Segoe UI,sans-serif;background:#f4f6f9;margin:0;padding:15px} .wrap{max-width:1000px;margin:auto}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px}.card,.q,.panel{background:#fff;border-radius:14px;padding:15px;box-shadow:0 2px 8px rgba(0,0,0,.08)} button{background:#0a84ff;color:#fff;border:0;padding:12px 18px;border-radius:10px}.scores{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}.score{color:#fff;padding:12px;border-radius:10px}.hidden{display:none}</style></head><body><div class='wrap'><h1>🏠 Ailemizi Daha İyi Anlıyoruz</h1><div id='home' class='cards'></div><div id='survey'></div><div id='result' class='hidden'></div></div><script>
const make=(prefix,items)=>items.map((t,i)=>({cat:prefix,text:t}));
const father=[...make('Duygusal Yakınlık',['Sevgisini hissettirir','Benimle zaman geçirir','Beni dinler','Değer verdiğini gösterir','Yakın hissederim']),...make('Empati',['Beni anlamaya çalışır','Duygularıma önem verir','Yargılamadan dinler','Sorunlarıma ilgi gösterir','Benim açımdan bakar']),...make('Güvenilirlik',['Sözünü tutar','Dürüsttür','Güven vericidir','Yanımda olur','Sorumluluk sahibidir']),...make('Öfke Kontrolü',['Sakin kalabilir','Bağırmadan konuşur','Kırıcı değildir','Tepkilerini kontrol eder','Affedicidir']),...make('İletişim',['Rahat konuşurum','Fikirlerime saygı duyar','Özür dileyebilir','Açık iletişim kurar','Dinler']),...make('Destekleyicilik',['Başarılarımı takdir eder','Hayallerimi destekler','Teşvik eder','Güvende hissettirir','Yanımdadır'])];
const mother=[...make('Şefkat',['Sevgisini gösterir','İlgilenir','Şefkatlidir','Koruyucudur','Yakın hissettirir']),...make('Empati',['Anlamaya çalışır','Dinler','Yargılamaz','Duygularıma önem verir','Sabırlıdır']),...make('İletişim',['Rahat konuşurum','Açık iletişim kurar','Dinler','Özür dileyebilir','Saygılıdır']),...make('Destek',['Destek olur','Teşvik eder','Özgüven verir','Yanımda olur','Başarılarımı kutlar']),...make('Adalet',['Adildir','Kıyaslamaz','Tutarlıdır','Haksızlık yapmaz','Eşit davranır']),...make('Aile İklimi',['Huzur sağlar','Birlikteliği önemser','Sorun çözer','Sevgi ortamı oluşturur','Saygıyı teşvik eder'])];
const child=[...make('Nezaket',['Selam verir','Teşekkür eder','Lütfen der','Eline sağlık der','Saygılı konuşur']),...make('Ev Sorumluluğu',['Odasını toplar','Eşyalarını düzenler','Sofraya yardım eder','Ev işlerine yardım eder','Temiz bırakır']),...make('Eğitim',['Ödev yapar','Ders çalışır','Kitap okur','Öğretmenlerine saygılıdır','Öğrenmeye isteklidir']),...make('Aile İlişkileri',['Vakit geçirir','Sorunlarını paylaşır','Kurallara uyar','Sevgisini gösterir','Değerlere önem verir']),...make('Karakter',['Dürüsttür','Sözünde durur','Hatasını kabul eder','Yardımseverdir','Empati kurar']),...make('Öz Disiplin',['Ekran süresini yönetir','Görevlerini tamamlar','Zaman planlar','Ertelemez','Pes etmez'])];
const surveys={father,mother,child}; const titles={father:'👨 Baba',mother:'👩 Anne',child:'🧒 Çocuk'};
const home=document.getElementById('home'); ['father','mother','child'].forEach(k=>home.innerHTML+=`<div class=card><h2>${titles[k]}</h2><button onclick="loadSurvey('${k}')">Başla</button></div>`);
let current='';
function loadSurvey(k){current=k; let h=''; surveys[k].forEach((q,i)=>{h+=`<div class=q><b>${i+1}. ${q.text}</b><div>${[1,2,3,4,5].map(v=>`<label><input type=radio name=q${i} value=${v}>${v}</label>`).join(' ')}</div></div>`}); h+=`<button onclick='calc()'>Rapor Oluştur</button>`; survey.innerHTML=h; }
function calc(){let t=0,max=surveys[current].length*5,cats={}; for(let i=0;i<surveys[current].length;i++){let c=document.querySelector('input[name=q'+i+']:checked'); if(!c){alert((i+1)+'. soru');return;} let v=+c.value;t+=v; let cat=surveys[current][i].cat;(cats[cat]=cats[cat]||[]).push(v);} let labels=[],vals=[],strength=[],improve=[]; for(let k in cats){let s=Math.round(cats[k].reduce((a,b)=>a+b)/cats[k].length*20); labels.push(k); vals.push(s); if(s>=80) strength.push(k); if(s<65) improve.push(k);} let p=Math.round(t/max*100); result.classList.remove('hidden'); result.innerHTML=`<div class=panel><h2>Sonuç %${p}</h2><canvas id=radar></canvas><div class=scores>${labels.map((l,i)=>`<div class='score' style='background:hsl(${i*50},70%,45%)'>${l}<br><b>%${vals[i]}</b></div>`).join('')}</div><h3>AI Analizi</h3><p>${p>80?'İlişki genel olarak güçlü görünüyor.':'Geliştirilmesi gereken alanlar bulunuyor.'} Güçlü yönler: ${strength.join(', ')||'Yok'}. Gelişim alanları: ${improve.join(', ')||'Yok'}.</p><textarea style='width:100%;height:120px' placeholder='Ek notlar'></textarea></div>`; new Chart(document.getElementById('radar'),{type:'radar',data:{labels:labels,datasets:[{data:vals}]}}); window.scrollTo(0,document.body.scrollHeight); localStorage.setItem('lastScore',p);}
</script></body></html>
